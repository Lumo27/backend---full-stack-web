<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTU | Target Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bunker-container">

        <!-- CONSOLA DE ENTRADA -->
        <header class="consola-input">
            <span class="prompt-text">[TARGET_URL]:</span>
            <input type="text" id="target-url" placeholder="Ingrese dominio objetivo ..." autocomplete="off">
            <button id="btn-scan">[INICIAR_ESCANEO]</button>
        </header>

        <!-- GRILLA DE PANELES (2x2) -->
        <main class="grid-paneles">

            <!-- PANEL 1 -->
            <section class="panel" id="panel-vista">
                <h2 class="panel-titulo">PANEL 1: [VISTA]</h2>
                <div class="contenido-panel">Esperando objetivo ... </div>
            </section>

            <!-- PANEL 2 -->
            <section class="panel" id="panel-tech">
                <h2 class="panel-titulo">PANEL 2: [DATOS TÉCNICOS]</h2>
                <div class="contenido-panel">Esperando objetivo ... </div>
            </section>

            <!-- PANEL 3 (con scroll para cientos de enlaces) -->
            <section class="panel" id="panel-enlaces">
                <h2 class="panel-titulo">PANEL 3: [ENLACES]</h2>
                <div class="contenido-panel scroll-activo">Esperando objetivo ... </div>
            </section>

            <!-- PANEL 4 -->
            <section class="panel" id="panel-metricas">
                <h2 class="panel-titulo">PANEL 4: [MÉTRICAS]</h2>
                <div class="contenido-panel">Esperando objetivo ... </div>
            </section>

        </main>
    </div>

    <!-- LÍNEA CRÍTICA (modificación SP2): sin esto el botón queda inerte -->
    <script src="script.js"></script>
</body>
</html>
